name: Fetch Travel Blog Articles

on:
  schedule:
    # Every day at 7:00 AM UTC
    - cron: '0 7 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wake up backend
        run: |
          echo "Pinging backend to wake Render from sleep..."
          for i in 1 2 3 4 5 6; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/api/health")
            echo "Attempt $i — HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Backend is awake"
              exit 0
            fi
            echo "Sleeping 15s..."
            sleep 15
          done
          echo "❌ Backend did not wake up in time"
          exit 1

      - name: Fetch latest travel blog articles
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.BACKEND_URL }}/api/jobs/fetch-blog" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" != "200" ]; then
            echo "❌ Job failed with status $response"
            exit 1
          fi

          echo "✅ Blog fetch complete"
          cat /tmp/response.json
